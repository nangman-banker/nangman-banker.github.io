<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>낭만뱅커 | 21세기 문명의 엔진</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* 이미지 외곽 배경은 검정색 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .brand-container {
            position: relative;
            width: 100%;
            max-width: 1200px; /* 큰 화면에서도 이미지가 너무 퍼지지 않게 제한 */
            line-height: 0;
        }
        .main-image {
            width: 100%;
            height: auto;
            display: block;
        }
        /* 클릭 영역을 만들고 싶을 때 사용하는 투명 버튼 (선택 사항) */
        .clickable-area {
            position: absolute;
            background: rgba(255, 255, 255, 0); /* 투명하게 설정 */
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="brand-container">
        <img src="홈피표지.jpg" alt="낭만뱅커 브랜드 아이덴티티" class="main-image">
        
        </div>

</body>
</html>
