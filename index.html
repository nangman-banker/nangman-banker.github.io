<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>낭만뱅커 | 돈과 문명 그리고 Ai</title>
    <style>
        /* 기본 여백 제거 및 배경색 설정 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        /* 컨테이너를 화면 너비 100%로 설정 */
        .container {
            position: relative;
            width: 100%;
            max-width: 100%; /* 제한 없이 꽉 차게 변경 */
            line-height: 0;
        }
        /* 이미지가 컨테이너 너비에 꽉 차도록 설정 */
        img {
            width: 100%;
            height: auto;
            display: block;
        }
        /* 투명 클릭 영역 (버튼 활성화) */
        .touch-link {
            position: absolute;
            background: rgba(255, 255, 255, 0);
            cursor: pointer;
            border: none;
        }
        /* 버튼 좌표 (이미지 크기에 비례하여 자동 조정됨) */
        .link-profile { width: 14%; height: 8%; left: 8%; bottom: 7%; }
        .link-youtube { width: 22%; height: 8%; left: 23%; bottom: 7%; }
        .link-blog { width: 22%; height: 13%; left: 46%; bottom: 7%; }

        .touch-link:hover {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="홈피표지.jpg" alt="낭만뱅커 브랜드 아이덴티티">
        
        <a href="https://blog.naver.com/여기에_프로필_주소" class="touch-link link-profile" title="Profile"></a>
        <a href="https://www.youtube.com/@nangmanbanker" class="touch-link link-youtube" title="YouTube"></a>
        <a href="https://blog.naver.com/여기에_블로그_주소" class="touch-link link-blog" title="Blog"></a>
    </div>

</body>
</html>
